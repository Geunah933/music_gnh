name: music_gnh
description: "MUSIC GNH - Private Music Metadata Manager"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  http: ^1.2.2

  # Image Caching
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

  # Typography
  google_fonts: ^6.2.1

  # Persistence
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5

  # URL Launcher
  url_launcher: ^6.3.1

  # Audio Player
  just_audio: ^0.9.43

  # File & Image Picker
  file_picker: ^8.1.7
  image_picker: ^1.1.2

  # Icons
  cupertino_icons: ^1.0.8
  youtube_explode_dart: ^3.1.0
  video_player: ^2.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/videos/opening.mp4
